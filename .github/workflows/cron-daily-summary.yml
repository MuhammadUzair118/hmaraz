name: Cron Daily Summary

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily summary cron
        run: |
          curl -s -X GET "${{ secrets.VERCEL_DEPLOYMENT_URL }}/api/cron/daily-summary" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}"
